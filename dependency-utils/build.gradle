plugins {
    id("application")
    id("maven-publish")
    id("ivy-publish")
}

description = "Check for new Dependency Versions"

repositories {
    maven {
        url = "https://repo.gradle.org/gradle/libs-releases"
        name = "gradle-libs-releases"
        content {
            includeGroup("org.gradle")
        }
    }
}

ext {
    mainClazz = "de.freese.dependency.update.VersionUpdatesLauncher"
}

application {
    mainClass = mainClazz
}
